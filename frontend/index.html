<!DOCTYPE html> 
<html lang="en"> 
    <head> 
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Webkinz Trading Hub</title> 
        <link rel="stylesheet" href="styles.css">
    </head> 
    <body> 
        <header>
            <div class="pageTitle">
                <h1>Webkinz Trading Hub</h1>
                <h2>A place to organize trades, keep track of your inventory, and create a wishlist.</h2>
            </div>
            <div id="accountButtons">
                <button id="loginButton" class="headerButton">Login</button>
                <button id="registerButton" class="headerButton">Register</button>
            </div>
        </header>
        <main>
            <div class="cards">
                <div class="card yellow">
                    <h2><a href=index.html>Browse Items</a></h2>
                    <p>Only tradeable items will be shown.</p>
                </div>
                <div class="card pink">
                    <h2><a href=index.html>View Inventory</a></h2>
                    <p>Keep track of the items you have for trade.</p>
                </div>
                <div class="card blue">
                    <h2><a href=index.html>Wishlist</a></h2>
                    <p>View the items you want to trade for.</p>
                </div>
            </div>
        </main>
    </body> 
</html>
