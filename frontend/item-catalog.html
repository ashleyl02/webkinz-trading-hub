<!DOCTYPE html> 
<html lang="en"> 
    <head> 
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Webkinz Trading Hub - Items</title> 
        <link rel="stylesheet" href="styles.css">
    </head> 
    <body> 
        <header>
            <div class="pageTitle">
                <h1>Webkinz Trading Hub</h1>
                <h2>A place to organize trades, keep track of your inventory, and create a wishlist.</h2>
            </div>
            <div id="accountButtons">
                <button id="loginButton" class="headerButton">Login</button>
                <button id="registerButton" class="headerButton">Register</button>
            </div>
        </header>
        <main>
            <nav class="card pink" style="width: 70%;">
                <h2>Browse Items</h2>
                <h3>Type</h3>
                <div class="tabs">
                    <button class="tab-links">Type</button>
                    <button class="tab-links">Theme</button>
                    <button class="tab-links">Color</button>
                    <button class="tab-links">Misc</button>
                </div>
                <h3><a>View All</a></h3>
            </nav>
        </main>
    </body> 
</html>
